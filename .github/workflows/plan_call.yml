name: Plan Call

on:
  workflow_call:
    inputs:
      environment:
        description: Both Github Environment and AWS Environment
        type: string
        required: true
    outputs:
      plan-artifact-id:
        description: The Artifact ID of the generated Terraform Plan
        value: ${{ jobs.plan.outputs.plan-artifact-id }}
      result-artifact-id:
        description: The Artifact ID of the Result JSON
        value: ${{ jobs.plan.outputs.result-artifact-id }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    name: Plan
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-west-2
    outputs:
      plan-artifact-id: ${{ steps.upload-plan.outputs.artifact-id }}
      result-artifact-id: ${{ steps.upload-result.outputs.artifact-id }}
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Reconfigure Git to use HTTP authentication
        run: |
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - name: Install AWS CLI
        uses: unfor19/install-aws-cli-action@f5b46b7f32cf5e7ebd652656c5036bf83dd1e60c # v1
        with:
          version: 2
          verbose: false
          arch: amd64
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        if: ${{ !env.ACT }}
        with:
          # The read-only plan role, NOT the legacy `-gh-actions-executor`. The executor was
          # retained only until workflows cut over to the split plan/apply roles; the apply paths
          # here (deploy.yml, publish-workflows.yml) were cut over and this one was missed, so it
          # still assumed a role that has no policy attachments at all. The first thing that failed
          # was the account-alias guard in `environment`: PowerUserAccess/executor cannot call
          # iam:ListAccountAliases, the guard read an empty alias, refused to continue, and unset
          # TF_DATA_DIR -- surfacing as `mkdir: cannot create directory ''`, which names neither the
          # role nor the denial. The plan role carries ReadOnlyAccess (which does allow
          # ListAccountAliases) plus scoped tfstate read, and its subject_ref_pattern is `*`, so the
          # `environment:<env>` OIDC subject this job presents is accepted.
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/czid-${{ inputs.environment }}-gh-actions-plan
          output-env-credentials: true
          #role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
          aws-profile: idseq-${{ inputs.environment }}
      - name: Configure AWS Credentials for local execution using nektos act
        uses: aws-actions/configure-aws-credentials@v6.1.0
        if: ${{ env.ACT }}
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          output-env-credentials: true
          #role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
          aws-profile: idseq-${{ inputs.environment }}
      - name: Read Terraform version (SSOT = .terraform-version)
        id: tfver
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false
      - name: Setup Terraform Environment
        # We manually create aws_config.json instead of using the 'init-tf' Makefile target, as that target also calls 'terraform init' without the '-upgrade' flag, which we need
        run: |
          set -x
          source "environment.${{ inputs.environment }}"
          set +x
          echo "TF_DATA_DIR=$TF_DATA_DIR"
          mkdir -p "$TF_DATA_DIR"
          jq -n ".region=\"us-west-2\" | .bucket=env.TF_S3_BUCKET | .key=env.APP_NAME+env.DEPLOYMENT_ENVIRONMENT | .encrypt=true" > "$TF_DATA_DIR/aws_config.json"
          jq . "$TF_DATA_DIR/aws_config.json"

          # Hand the sourced environment to the LATER steps. Every `run:` block is its own shell,
          # so nothing `environment.<env>` exports survives past this step -- which made this step a
          # no-op for everything downstream and meant this workflow could never have completed a
          # plan. `make` tripped its own DEPLOYMENT_ENVIRONMENT guard first ("Please run source
          # environment..."), and had it not, `terraform init` would have failed next with no
          # TF_CLI_ARGS_init to point it at the S3 backend.
          #
          # Only the variables `environment` derives are forwarded. AWS credentials are NOT included:
          # configure-aws-credentials already publishes those, and $GITHUB_ENV is plain text in the
          # runner log.
          for v in APP_HOME APP_NAME DEPLOYMENT_ENVIRONMENT TF_DATA_DIR TFSTATE_FILE \
                   TF_CLI_ARGS_init TF_CLI_ARGS_output AWS_SDK_LOAD_CONFIG AWS_DEFAULT_REGION \
                   AWS_ACCOUNT_ID AWS_ACCOUNT_ALIAS TF_S3_BUCKET DOCKER_REGISTRY \
                   OWNER TF_VAR_owner TF_VAR_environment; do
            printf '%s=%s\n' "$v" "${!v}" >> "$GITHUB_ENV"
          done
      - name: Package Lambdas and create Templates
        run: |
          make package-lambdas templates
      - name: Terraform Plan
        run: |
          # No -upgrade: provider versions are pinned by the committed
          # .terraform.lock.hcl so plans are reproducible and a malicious/broken
          # provider release can't slip in between runs (CZID-30 / STATE-2).
          terraform init -input=false
          echo "Plan will be created in: ${{ github.workspace }}/tf.plan"
          set +e
          terraform plan -input=false -detailed-exitcode -refresh=false -out="${{ github.workspace }}/tf.plan"
          exitcode=$?
          echo "Terraform exited with exit-code $exitcode"
          if [[ $exitcode -eq 1 ]]; then
            exit $exitcode
          fi
          set -e
          terraform show -json "${{ github.workspace }}/tf.plan" > plan.json
          jq '.resource_changes[] | select(.change.actions[0] != "no-op" and .change.actions[0] != "read")' plan.json | jq '{address, action: .change.actions[0]}' | jq -c --slurp . > "${{ github.workspace }}/resource_changes.json"
          jq -c . "${{ github.workspace }}/resource_changes.json"
      # TODO: Only uncomment for local execution via nektos act, when testing outputs and artifacts
      #- name: Terraform Plan
      #  run: |
      #    echo foo > "${{ github.workspace }}/tf.plan"
      #    jq -cn '$ARGS.positional' --jsonargs '{"address": "foo", "action": "create"}' '{"address": "bar", "action": "update"}' '{"address": "baz", "action": "delete"}' > "${{ github.workspace }}/resource_changes.json"
      - name: Upload Plan as Artifact
        id: upload-plan
        uses: actions/upload-artifact@v5
        with:
          name: plan
          path: ${{ github.workspace }}/tf.plan
          retention-days: 1
          compression-level: 0 # Plan files are already pretty compact, and max compression gives at best 10% savings
          if-no-files-found: error
      - name: Create Result JSON
        run: |
          change_count=$(jq 'length' "${{ github.workspace }}/resource_changes.json")
          echo "change-count=$change_count"
          jq -cnS \
            --arg artifact_name "plan" \
            --arg artifact_id "${{ steps.upload-plan.outputs.artifact-id }}" \
            --argjson change_count "$change_count" \
            --argjson resource_changes "$(<"${{ github.workspace }}/resource_changes.json")" \
            '$ARGS.named' > "${{ github.workspace }}/result.json"
          jq . "${{ github.workspace }}/result.json"
      - name: Upload Result JSON as Artifact
        id: upload-result
        uses: actions/upload-artifact@v5
        with:
          name: result
          path: ${{ github.workspace }}/result.json
          retention-days: 1
          if-no-files-found: error

name: CypherID Workflow Infra Deploy
run-name: Deploy CypherID Workflow Infra to ${{ inputs.environment }}${{ inputs.plan-run-id && format(' (reviewed plan from run {0})', inputs.plan-run-id) || '' }}

# CD HYGIENE (CZID-751). This workflow supports two apply paths, chosen by whether
# plan-run-id is supplied:
#
#   1. DEFAULT path (plan-run-id EMPTY, the default):
#      Runs the same prep as `make deploy` (package-lambdas, templates, init) but
#      plans to a SAVED plan file, runs a destroy guard over it, then applies that
#      exact saved plan. The guard fails the run if the plan would delete (destroy
#      or replace) any resource, unless allow_destroy=true is passed. This replaces
#      the previous unguarded `terraform apply --auto-approve` of the live config,
#      which auto-approved accidental destroys. -target scoping still works (it is
#      applied to the plan step). Behavior is otherwise unchanged: same prep, same
#      diff (frozen a moment earlier), just gated on deletes.
#
#   2. REVIEWED-APPLY path (plan-run-id SET -- OPT-IN, off by default):
#      Downloads the exact `tf.plan` artifact produced by a prior "Plan only"
#      run (plan_only.yml -> plan_call.yml) and runs `terraform apply tf.plan`.
#      terraform applies ONLY the frozen, reviewed diff and refuses the saved
#      plan outright if state has moved since it was generated. This mirrors
#      web-infra's plan_all/apply_all run-id linkage model.
#
# Neither path auto-applies: both are workflow_dispatch, human-triggered. This
# change adds path 2 as INERT/opt-in and does NOT enable any automatic apply.
#
# CAUTION: workflow-infra has a large pending-change backlog (see CZID-708, ~92
# changes). Do NOT run a full apply of this repo blindly on either path. Review
# the "Plan only" summary first; for the reviewed-apply path, pass that run's id
# so the apply is exactly what was reviewed.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'The environment to which to deploy'
        required: true
        type: string
        default: 'dev'
      targets:
        description: >-
          Optional space-separated terraform resource addresses. When set, the apply is limited to
          these (-target) instead of the whole configuration. This apply is --auto-approve with no
          plan-linkage, so it applies whatever the config wants at run time; scoping it is how a
          narrow change gets applied without dragging along unrelated pending drift. Plan the same
          targets with the "Plan only" workflow first and confirm the diff. Leave empty for a full
          apply. IGNORED when plan-run-id is set (the reviewed plan already fixes its own scope).
        required: false
        type: string
        default: ''
      allow_destroy:
        description: >-
          Destroy guard override for the default (legacy) apply path. That path now plans to a saved
          plan file and REFUSES to apply if any resource would be deleted -- a pure destroy, or the
          delete half of a replace -- unless this is set to true. Leave false for normal deploys; set
          true only after reviewing the addresses the failed run printed and confirming the
          destroy/replace is intended. Has no effect on the reviewed-apply (plan-run-id) path, which
          already applies a separately reviewed, frozen plan.
        required: false
        type: boolean
        default: false
      plan-run-id:
        description: >-
          OPT-IN reviewed-apply. Leave EMPTY (default) for the legacy make-deploy apply. Set it to
          the GitHub Actions run id of a completed "Plan only" run to apply that run's exact,
          reviewed tf.plan instead -- terraform applies only that frozen diff and refuses it if
          state has drifted since. This is the safer, plan-linked path.
        required: false
        type: string
        default: ''

env:
  AWS_REGION : us-west-2
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}

permissions:
  id-token: write
  contents: read

jobs:
  DeployTerraform:
    name: Default apply (plan -> destroy guard -> apply saved plan)
    # Runs ONLY when no plan-run-id is supplied, i.e. the default. The opt-in
    # reviewed-apply job below runs instead when a plan-run-id is given, so exactly
    # one of the two ever runs.
    if: ${{ inputs.plan-run-id == '' }}
    runs-on: ubuntu-latest
    # C4: gate the deploy by the GitHub Environment so prod requires the reviewer
    # approval configured on the Environment (protection rules land with #81). Was
    # ungated -- an auto-approve `terraform apply` behind only a shell branch/account
    # guard, with no environment: and no plan-linkage. It now also carries a destroy
    # guard (see the "Deploy dev" step) so an accidental delete is not auto-approved.
    environment: ${{ inputs.environment }}
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v6
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          # Per-env least-privilege apply role in the TARGET account -- the same identity our
          # terraform plan/apply and web-infra deploys use, whose czid_ci_cd policy authorizes
          # batch/states/lambda/ecr/s3. Replaces the shared idseq-support gha-seqtoid role. The
          # apply role is trusted only from refs/heads/main, which is the workflow_dispatch
          # default ref. CZID-40 (CICD-6) / CZID-81.
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/czid-${{ inputs.environment }}-gh-actions-apply
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
          # aws-profile is load-bearing, not tidiness. `environment` derives the region with
          #   AWS_DEFAULT_REGION=$(aws configure get region)
          # which reads the profile CONFIG FILE, not the aws-region input above and not the
          # AWS_DEFAULT_REGION that init_ci_runner.sh already exported. Without a profile written to
          # disk that command returns empty and the assignment silently overwrites a correct region
          # with nothing:
          #   +++++ aws configure get region
          #   ++++ AWS_DEFAULT_REGION=
          # Every later AWS call then runs with no region. plan_call.yml sets aws-profile, which is
          # why the plan path works and this one did not.
          aws-profile: idseq-${{ inputs.environment }}
          output-env-credentials: true
      - name: Sts GetCallerIdentity
        run: |
          aws sts get-caller-identity
    #   - name: Install initial tools required by report_deployment_status.sh
    #     run: |
    #       sudo apt-get update
    #       sudo apt-get install jq
    #       sudo apt-get install -y httpie
    #   - name: Output GH Event Data
    #     run: |
    #       jq -r . "$GITHUB_EVENT_PATH"
      - name: Deploy dev
        # Inputs are passed through env (NOT interpolated into the shell) so a value
        # like targets can never break out of the script -- injection-safe.
        env:
          TARGETS: ${{ inputs.targets }}
          ALLOW_DESTROY: ${{ inputs.allow_destroy }}
        run: |
          #trap 'scripts/report_deployment_status.sh failure' ERR
          #scripts/report_deployment_status.sh in_progress "Starting deployment"
          source scripts/init_ci_runner.sh

          # Optional -target scoping, read from $TARGETS (env, injection-safe). Applied to the PLAN
          # step below; the saved plan then carries its own scope into apply, so we do NOT push
          # -target through TF_CLI_ARGS_apply anymore.
          TARGET_ARGS=""
          if [[ -n "$TARGETS" ]]; then
            for t in $TARGETS; do
              TARGET_ARGS="$TARGET_ARGS -target=$t"
            done
            echo "SCOPED PLAN/APPLY -- terraform will touch only the targets below, not the full config:"
            # shellcheck disable=SC2086  # intentional word-split: one line per target
            printf '  %s\n' $TARGETS
          fi

          # Same prep as `make deploy` (package lambda zips, render templates, terraform init) but
          # WITHOUT its `terraform apply`: we plan to a saved file, guard it, then apply that file so
          # what the guard checked is exactly what applies.
          make package-lambdas templates init-tf

          # Freeze the diff so the destroy guard inspects EXACTLY what will apply.
          # shellcheck disable=SC2086  # intentional word-split: TARGET_ARGS is a list of -target flags
          terraform plan -out=tfplan $TARGET_ARGS
          terraform show -json tfplan > plan.json

          # --- Destroy guard ---
          # Fail if the saved plan would delete anything -- a pure destroy OR the delete half of a
          # replace (.change.actions contains "delete") -- unless allow_destroy=true was passed to
          # this dispatch. Mirrors web-infra apply_all's guard, adapted to this single saved-plan
          # shape. `[]?` tolerates a plan.json with no resource_changes (empty/no-op plan).
          delete_count=$(jq '[.resource_changes[]? | select(.change.actions | index("delete"))] | length' plan.json)
          echo "destroy guard: $delete_count resource(s) with a delete action in the plan for ${DEPLOYMENT_ENVIRONMENT}"
          if [[ "$delete_count" -gt 0 ]]; then
            if [[ "$ALLOW_DESTROY" == "true" ]]; then
              echo "::warning::Destroy guard OVERRIDDEN (allow_destroy=true): applying despite $delete_count destroy/replace action(s) in ${DEPLOYMENT_ENVIRONMENT}:"
              jq -r '.resource_changes[]? | select(.change.actions | index("delete")) | "::warning::  destroy/replace: \(.address) [\(.change.actions | join(","))]"' plan.json
            else
              echo "::error::Destroy guard: the plan for ${DEPLOYMENT_ENVIRONMENT} would destroy or replace $delete_count resource(s). This is blocked by default. Re-run this workflow with allow_destroy=true (after reviewing the addresses below) to proceed."
              jq -r '.resource_changes[]? | select(.change.actions | index("delete")) | "::error::  would destroy/replace: \(.address) [\(.change.actions | join(","))]"' plan.json
              exit 1
            fi
          fi

          # Apply the SAVED plan (not a fresh diff of the live config). A saved plan needs no
          # --auto-approve -- passing the plan file IS the approval -- so drop the one
          # init_ci_runner.sh exported to keep the command clean.
          unset TF_CLI_ARGS_apply
          terraform apply tfplan

  ApplyReviewedPlan:
    name: Reviewed apply (plan->apply linkage, opt-in)
    # OPT-IN reviewed-apply path (CZID-751). Runs ONLY when a plan-run-id is
    # supplied; DeployTerraform above runs when it is empty, so this workflow's
    # default behavior is unchanged and this job is inert unless a reviewer
    # deliberately passes a plan run id. It applies the EXACT tf.plan artifact
    # from that "Plan only" run rather than make deploy's --auto-approve apply of
    # whatever the live config wants -- terraform refuses a saved plan if state
    # has moved since it was generated, so the reviewer approves a frozen diff.
    if: ${{ inputs.plan-run-id != '' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 matches plan_call.yml.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Reconfigure Git to use HTTP authentication
        run: |
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - name: Install AWS CLI
        uses: unfor19/install-aws-cli-action@f5b46b7f32cf5e7ebd652656c5036bf83dd1e60c # v1
        with:
          version: 2
          verbose: false
          arch: amd64
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          # Same per-env least-privilege apply role and profile as the legacy job.
          # See the DeployTerraform job for why aws-profile is load-bearing.
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/czid-${{ inputs.environment }}-gh-actions-apply
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
          aws-profile: idseq-${{ inputs.environment }}
          output-env-credentials: true
      - name: Sts GetCallerIdentity
        run: |
          aws sts get-caller-identity
      - name: Read Terraform version (SSOT = .terraform-version)
        id: tfver
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false
      - name: Setup Terraform Environment
        # Mirror plan_call.yml: source environment.<env> and forward the variables
        # terraform needs (TF_DATA_DIR, TF_CLI_ARGS_init pointing at the S3 backend,
        # etc.) to later steps. Every run: block is its own shell, so this must be
        # forwarded via $GITHUB_ENV. AWS credentials are NOT forwarded here --
        # configure-aws-credentials already published them.
        run: |
          set -x
          source "environment.${{ inputs.environment }}"
          set +x
          echo "TF_DATA_DIR=$TF_DATA_DIR"
          mkdir -p "$TF_DATA_DIR"
          jq -n ".region=\"us-west-2\" | .bucket=env.TF_S3_BUCKET | .key=env.APP_NAME+env.DEPLOYMENT_ENVIRONMENT | .encrypt=true" > "$TF_DATA_DIR/aws_config.json"
          jq . "$TF_DATA_DIR/aws_config.json"
          for v in APP_HOME APP_NAME DEPLOYMENT_ENVIRONMENT TF_DATA_DIR TFSTATE_FILE \
                   TF_CLI_ARGS_init TF_CLI_ARGS_output AWS_SDK_LOAD_CONFIG AWS_DEFAULT_REGION \
                   AWS_ACCOUNT_ID AWS_ACCOUNT_ALIAS TF_S3_BUCKET DOCKER_REGISTRY \
                   OWNER TF_VAR_owner TF_VAR_environment; do
            printf '%s=%s\n' "$v" "${!v}" >> "$GITHUB_ENV"
          done
      - name: Package Lambdas and create Templates
        # The saved plan references locally generated artifacts (lambda zips,
        # chalice.tf.json, rendered templates). Regenerate them exactly as the plan
        # run did so `terraform apply tf.plan` sees the same files. If a generated
        # artifact is not byte-reproducible, terraform will reject the saved plan as
        # stale -- which fails safe (it will not apply an unreviewed diff).
        run: |
          make package-lambdas templates
      - name: Download the reviewed plan artifact
        uses: actions/download-artifact@v5
        with:
          name: plan
          path: ${{ github.workspace }}
          run-id: ${{ inputs.plan-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Terraform Init and Apply the reviewed plan
        run: |
          terraform init -input=false
          if [[ ! -f "${{ github.workspace }}/tf.plan" ]]; then
            echo "::error::No tf.plan artifact found for run ${{ inputs.plan-run-id }}. Run a 'Plan only' for this environment and pass its run id."
            exit 1
          fi
          echo "Applying the reviewed plan from run ${{ inputs.plan-run-id }}."
          echo "terraform will refuse this saved plan if state has drifted since it was generated."
          # No --auto-approve: a saved plan file is applied without a prompt by
          # definition, and only the changes it froze -- never a fresh diff of the
          # live config.
          terraform apply -input=false "${{ github.workspace }}/tf.plan"
name: CypherID Workflow Infra Deploy
run-name: Deploy CypherID Workflow Infra to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'The environment to which to deploy'
        required: true
        type: string
        default: 'dev'
      targets:
        description: >-
          Optional space-separated terraform resource addresses. When set, the apply is limited to
          these (-target) instead of the whole configuration. This apply is --auto-approve with no
          plan-linkage, so it applies whatever the config wants at run time; scoping it is how a
          narrow change gets applied without dragging along unrelated pending drift. Plan the same
          targets with the "Plan only" workflow first and confirm the diff. Leave empty for a full
          apply.
        required: false
        type: string
        default: ''

env:
  AWS_REGION : us-west-2
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}

permissions:
  id-token: write
  contents: read

jobs:
  DeployTerraform:
    runs-on: ubuntu-latest
    # C4: gate the deploy by the GitHub Environment so prod requires the reviewer
    # approval configured on the Environment (protection rules land with #81). Was
    # ungated — an auto-approve `terraform apply` behind only a shell branch/account
    # guard, with no environment: and no plan-linkage.
    environment: ${{ inputs.environment }}
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v6
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          # Per-env least-privilege apply role in the TARGET account -- the same identity our
          # terraform plan/apply and web-infra deploys use, whose czid_ci_cd policy authorizes
          # batch/states/lambda/ecr/s3. Replaces the shared idseq-support gha-seqtoid role. The
          # apply role is trusted only from refs/heads/main, which is the workflow_dispatch
          # default ref. CZID-40 (CICD-6) / CZID-81.
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/czid-${{ inputs.environment }}-gh-actions-apply
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
      - name: Sts GetCallerIdentity
        run: |
          aws sts get-caller-identity
    #   - name: Install initial tools required by report_deployment_status.sh
    #     run: |
    #       sudo apt-get update
    #       sudo apt-get install jq
    #       sudo apt-get install -y httpie
    #   - name: Output GH Event Data
    #     run: |
    #       jq -r . "$GITHUB_EVENT_PATH"
      - name: Deploy dev
        run: |
          #trap 'scripts/report_deployment_status.sh failure' ERR
          #scripts/report_deployment_status.sh in_progress "Starting deployment"
          source scripts/init_ci_runner.sh

          # Optional -target scoping. init_ci_runner.sh sets TF_CLI_ARGS_apply=--auto-approve, so
          # append rather than assign, and do it after sourcing or it gets overwritten.
          if [[ -n "${{ inputs.targets }}" ]]; then
            for t in ${{ inputs.targets }}; do
              TF_CLI_ARGS_apply="$TF_CLI_ARGS_apply -target=$t"
            done
            export TF_CLI_ARGS_apply
            echo "SCOPED APPLY -- terraform will touch only the targets below, not the full config:"
            printf '  %s\n' ${{ inputs.targets }}
          fi
          echo "TF_CLI_ARGS_apply=$TF_CLI_ARGS_apply"

          make deploy
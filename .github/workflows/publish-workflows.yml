name: Publish WDL Workflow Version
run-name: Publish ${{ inputs.workflow_tag }} to ${{ inputs.environment }}

# Builds + publishes a single WDL workflow version (Docker image to ECR + WDL/JSON to the
# per-environment workflows bucket) for a git release tag (e.g. short-read-mngs-v8.3.11).
# See docs/WORKFLOW-VERSIONING.md for the versioning scheme + promotion model (#335).
on:
  workflow_dispatch:
    inputs:
      workflow_tag:
        description: 'Workflow release tag (WORKFLOW_NAME-vX.Y.Z), e.g. short-read-mngs-v8.3.11'
        required: true
        type: string
      environment:
        description: 'Target environment (publishes into that env account''s workflows bucket)'
        required: true
        type: choice
        options: [dev, staging, prod, sandbox]
        default: 'dev'

env:
  AWS_REGION: us-west-2
  AWS_DEFAULT_REGION: us-west-2
  DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Gate by the GitHub Environment so vars.AWS_ACCOUNT_ID resolves to the target env
    # account and prod publishes require the Environment's reviewer approval. CZID-81.
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          # Per-env apply role in the TARGET account -- its czid_ci_cd policy grants the ECR
          # push + workflows-bucket S3 writes this publish needs. Replaces the shared
          # idseq-support gha-seqtoid role. Dispatch from main (the apply role is trusted only
          # from refs/heads/main); the release tag is the workflow_tag input, not the run ref.
          # CZID-81.
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/czid-${{ inputs.environment }}-gh-actions-apply
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
      - name: Resolve account id
        run: echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"
      - name: Install miniwdl
        run: pipx install miniwdl
      - name: Publish workflow version
        run: scripts/publish_wdl_workflows.sh "${{ inputs.workflow_tag }}"

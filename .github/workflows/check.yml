name: idseq-web check

on:
  #  push
  workflow_dispatch:

jobs:
  python:
    name: Check Python
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Cache Python Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip
          #pip-version:
          pip-install: -r requirements-dev.txt
      - name: Run flake8
        # Our modernized flake8-action (upstream julianwachholz is node16/EOL),
        # pinned to the SSOT `v2` moving tag in thorvath-slower/flake8-action —
        # the single source of truth for the version across all repos. See CZID-204.
        uses: thorvath-slower/flake8-action@v2
        with:
          checkName: "Python Lint"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#      - name: Test # TODO: need to setup localstack
#        run: python3 -m unittest discover -v -s test/ -p 'test_*.py'

name: idseq-web check

on:
  #  push
  workflow_dispatch:

jobs:
  python:
    name: Check Python
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Cache Python Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip
          #pip-version:
          pip-install: -r requirements-dev.txt
      - name: Run flake8
        # Was julianwachholz/flake8-action@v2 (runs.using: node16 — past EOL,
        # force-run on a newer Node and removed from runners). flake8 is already
        # installed via requirements-dev.txt (setup-python step above), so invoke
        # it directly — no third-party Node action, nothing to keep node-current.
        run: flake8
#      - name: Test # TODO: need to setup localstack
#        run: python3 -m unittest discover -v -s test/ -p 'test_*.py'
